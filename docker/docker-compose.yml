version: '3.8'

services:
  # API Gateway (nginx)
  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-service
      - marketplace-service
      - payments-service
      - notifications-service
      - messaging-service

  # Core Banking Service
  core-service:
    build: ../services/core-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chama
      - KAFKA_SERVICE_URL=http://kafka-service:9092
    depends_on:
      - postgres
      - kafka-service

  # Marketplace Service
  marketplace-service:
    build: ../services/marketplace-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chama
      - KAFKA_SERVICE_URL=http://kafka-service:9092
    depends_on:
      - postgres
      - kafka-service

  # Payments Service
  payments-service:
    build: ../services/payments-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chama
      - KAFKA_SERVICE_URL=http://kafka-service:9092
    depends_on:
      - postgres
      - kafka-service

  # Notifications Service
  notifications-service:
    build: ../services/notifications-service
    ports:
      - "8004:8004"
    environment:
      - KAFKA_SERVICE_URL=http://kafka-service:9092
    depends_on:
      - kafka-service

  # Messaging Service (Real-time)
  messaging-service:
    build: ../services/messaging-service
    ports:
      - "8005:8003"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # Kafka Event Bus
  kafka-service:
    build: ../services/kafka-service
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ADVERTISED_HOST_NAME=kafka-service

  # PostgreSQL
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=chama
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis (for caching & pub/sub)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ZooKeeper (for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

volumes:
  postgres_data:
